name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Verify tag and manifest version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node -e '
            const manifest = require("./manifest.json");
            const packageJson = require("./package.json");
            const versions = require("./versions.json");
            const tag = process.env.RELEASE_TAG;
            if (tag !== manifest.version) throw new Error(`Tag ${tag} does not match manifest version ${manifest.version}`);
            if (packageJson.version !== manifest.version) throw new Error(`package.json version ${packageJson.version} does not match manifest version ${manifest.version}`);
            if (versions[manifest.version] !== manifest.minAppVersion) throw new Error(`versions.json does not map ${manifest.version} to ${manifest.minAppVersion}`);
          '

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" \
            main.js \
            manifest.json \
            styles.css \
            "dist/ostracon-ob-$RELEASE_TAG.zip" \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --generate-notes
